; MediTwin AI — ESP32-C6-WROOM-1
; PlatformIO configuration

; ─── Shared settings ─────────────────────────────────────────────────────────
[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-c6-devkitc-1
framework = arduino
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, log2file
build_flags_base =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit MPU6050@^2.2.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    bblanchon/ArduinoJson@^7.3.1

; ─── PRODUCTION firmware ─────────────────────────────────────────────────────
[env:meditwin_esp32c6]
platform    = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board       = esp32-c6-devkitc-1
framework   = arduino
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, log2file
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
    +<*>                           ; include all src files
    -<wifi_comm.cpp>               ; UART replaces WiFi for Pi comm
    -<sensor_test.cpp>             ; exclude test entry point
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit MPU6050@^2.2.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    bblanchon/ArduinoJson@^7.3.1

; ─── TEST / CALIBRATION firmware ─────────────────────────────────────────────
; Upload with:  pio run -e meditwin_test -t upload
[env:meditwin_test]
platform    = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board       = esp32-c6-devkitc-1
framework   = arduino
upload_port     = COM8
monitor_port    = COM8
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = default
build_flags =
    -D SENSOR_TEST_MODE=1          ; activates sensor_test.cpp entry point
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0
build_src_filter =
    -<main.cpp>                    ; exclude production entry point
    +<sensor_test.cpp>             ; include test entry point
    +<scheduler.cpp>
    +<uart_comm.cpp>
    +<dht22.cpp>
    +<mq135.cpp>
    +<ldr.cpp>
    +<hcsr04.cpp>
    +<mpu6050_sens.cpp>
    +<acs712.cpp>
    +<actuators.cpp>
    +<sensors.cpp>
    +<alarm_fsm.cpp>
    +<buttons.cpp>
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit MPU6050@^2.2.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    madhephaestus/ESP32Servo@^3.0.6
    bblanchon/ArduinoJson@^7.3.1
